        // Load flights on map based on filter criteria
        async function loadFlightsOnMap() {
            if (!overviewMap) {
                console.error('Map not initialized');
                return;
            }
            
            const loadingDiv = document.getElementById('overviewMapLoading');
            const updateBtn = document.getElementById('updateMapBtn');
            
            if (!loadingDiv) {
                return;
            }
            
            // Disable update button
            if (updateBtn) {
                updateBtn.disabled = true;
            }
            
            // Show loading
            loadingDiv.style.display = 'flex';
            const loadingText = loadingDiv.querySelector('.loading-text');
            const progressText = document.getElementById('overviewMapProgress');
            
            try {
                // Clear existing polylines and stop path animations
                mapPolylineEntries.forEach(({ polyline, animator }) => {
                    if (animator) animator.cancel();
                    if (overviewMap.hasLayer(polyline)) {
                        overviewMap.removeLayer(polyline);
                    }
                });
                mapPolylineEntries = [];
                const overviewReplayBtn = document.getElementById('overviewMapReplayBtn');
                if (overviewReplayBtn) overviewReplayBtn.style.display = 'none';
                
                // Get date filter values
                const startDateInput = document.getElementById('filterStartDate');
                const endDateInput = document.getElementById('filterEndDate');
                
                let startTime = null;
                let endTime = null;
                
                if (startDateInput && startDateInput.value) {
                    const startDate = new Date(startDateInput.value);
                    startDate.setHours(0, 0, 0, 0);
                    startTime = startDate.toISOString();
                }
                
                if (endDateInput && endDateInput.value) {
                    const endDate = new Date(endDateInput.value);
                    endDate.setHours(23, 59, 59, 999);
                    endTime = endDate.toISOString();
                }
                
                // Build API URL with filters
                let apiUrl = '/api/flights?limit=10000';
                if (startTime) {
                    apiUrl += `&first_seen_start=${encodeURIComponent(startTime)}`;
                }
                if (endTime) {
                    apiUrl += `&first_seen_end=${encodeURIComponent(endTime)}`;
                }
                
                if (loadingText) loadingText.textContent = 'Fetching flights...';
                if (progressText) progressText.textContent = '';
                
                // Fetch filtered flights
                const response = await fetch(apiUrl);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                const filteredFlights = data.flights || [];
                
                if (loadingText) loadingText.textContent = `Loading ${filteredFlights.length} flights...`;
                
                if (filteredFlights.length === 0) {
                    if (progressText) progressText.textContent = 'No flights found for selected date range';
                    setTimeout(() => {
                        loadingDiv.style.display = 'none';
                        if (updateBtn) updateBtn.disabled = false;
                        const orb = document.getElementById('overviewMapReplayBtn');
                        if (orb) orb.style.display = 'none';
                    }, 2000);
                    return;
                }
                
                // Rainbow palette for overview map polylines (distinct paths per flight)
                const colors = [
                    '#3e91be', '#cd3c65', '#28a745', '#ffc107', '#17a2b8',
                    '#6f42c1', '#e83e8c', '#fd7e14', '#20c997', '#6c757d',
                    '#007bff', '#6610f2', '#6f42c1', '#e83e8c', '#dc3545'
                ];
                
                let drawnCount = 0;
                const totalFlights = filteredFlights.length;
                
                if (progressText) progressText.textContent = 'Loading flight tracks…';
                
                /** One POST loads all tracks (single DB query). Falls back to parallel GETs if unavailable. */
                let positionsArrays = null;
                try {
                    const batchRes = await fetch('/api/flights/batch-positions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({ flight_ids: filteredFlights.map(f => f.id) })
                    });
                    if (batchRes.ok) {
                        const batchJson = await batchRes.json();
                        const byF = batchJson.positions_by_flight || {};
                        positionsArrays = filteredFlights.map(f => byF[String(f.id)] || []);
                    }
                } catch (e) {
                    console.warn('Batch positions request failed:', e);
                }
                
                if (!positionsArrays) {
                    const CONCURRENCY = 14;
                    positionsArrays = new Array(totalFlights);
                    let nextIdx = 0;
                    let finished = 0;
                    const worker = async () => {
                        while (true) {
                            const i = nextIdx++;
                            if (i >= totalFlights) return;
                            const flight = filteredFlights[i];
                            try {
                                const posResponse = await fetch(`/api/flights/${flight.id}/positions`);
                                if (!posResponse.ok) {
                                    positionsArrays[i] = [];
                                } else {
                                    const posData = await posResponse.json();
                                    positionsArrays[i] = posData.positions || [];
                                }
                            } catch (err) {
                                console.warn(`Error loading positions for flight ${flight.id}:`, err);
                                positionsArrays[i] = [];
                            }
                            finished++;
                            if (progressText && (finished % 25 === 0 || finished === totalFlights)) {
                                progressText.textContent = `Loading tracks ${finished}/${totalFlights}…`;
                            }
                        }
                    };
                    await Promise.all(
                        Array.from({ length: Math.min(CONCURRENCY, Math.max(1, totalFlights)) }, () => worker())
                    );
                } else if (progressText) {
                    progressText.textContent = `Drawing ${totalFlights} tracks…`;
                }
                
                for (let i = 0; i < filteredFlights.length; i++) {
                    const flight = filteredFlights[i];
                    const color = colors[i % colors.length];
                    const positions = positionsArrays[i];
                    
                    try {
                        const validPositions = positions.filter(p => {
                            const lat = p.lat;
                            const lon = p.lon;
                            return lat != null && lon != null && 
                                   !isNaN(parseFloat(lat)) && !isNaN(parseFloat(lon)) &&
                                   parseFloat(lat) !== 0 && parseFloat(lon) !== 0;
                        });
                        
                        if (validPositions.length > 0) {
                            const rawPath = validPositions.map(p => [p.lat, p.lon]);
                            const path = [];
                            for (let pi = 0; pi < rawPath.length; pi++) {
                                const pt = rawPath[pi];
                                const prev = path[path.length - 1];
                                if (!prev || prev[0] !== pt[0] || prev[1] !== pt[1]) {
                                    path.push(pt);
                                }
                            }
                            
                            const polylineOpts = {
                                color: color,
                                weight: 2,
                                opacity: 0.6
                            };
                            if (overviewPathRenderer) {
                                polylineOpts.renderer = overviewPathRenderer;
                            }
                            const polyline = L.polyline(path, polylineOpts).addTo(overviewMap);

                            if (path.length >= 2) {
                                const animator = createPathPlaneAnimator(overviewMap, polyline, path, {
                                    planeFill: color,
                                    hidePlaneDelay: 550,
                                    durationFn: (n) => Math.max(500, Math.min(2200, 300 + n * 12))
                                });
                                animator.primeHidden();
                                mapPolylineEntries.push({ polyline, animator });
                            }
                            drawnCount++;
                        }
                    } catch (error) {
                        console.warn(`Error drawing flight ${flight.id}:`, error);
                    }
                }
                
                // Get receiver location for centering
                let receiverLat = 52.40585;
                let receiverLon = 13.55214;
                
                try {
                    const configResponse = await fetch('/api/config');
                    if (configResponse.ok) {
                        const config = await configResponse.json();
                        if (config.receiver_lat && config.receiver_lon) {
                            receiverLat = config.receiver_lat;
                            receiverLon = config.receiver_lon;
                        }
                    }
                } catch (e) {
                    // Use defaults
                }
                
                // Center map on receiver location
                if (progressText) progressText.textContent = 'Centering on receiver location...';
                overviewMap.setView([receiverLat, receiverLon], 10);
                
                // Hide loading overlay, then run the same dash + plane animation as the per-flight maps.
                // Wait for layout + SVG path metrics (getTotalLength) before starting dash animation.
                setTimeout(() => {
                    loadingDiv.style.display = 'none';
                    if (updateBtn) updateBtn.disabled = false;
                    const orb = document.getElementById('overviewMapReplayBtn');
                    if (orb) {
                        orb.style.display = mapPolylineEntries.length > 0 ? 'block' : 'none';
                    }
                    runOverviewPathAnimations();
                }, 500);
                
                console.log(`✅ Map updated with ${drawnCount} flights drawn`);
                
            } catch (error) {
                console.error('Error loading flights on map:', error);
                if (loadingText) loadingText.textContent = 'Error loading flights';
                if (progressText) progressText.textContent = error.message || 'Unknown error';
                if (updateBtn) updateBtn.disabled = false;
                const orb = document.getElementById('overviewMapReplayBtn');
                if (orb) orb.style.display = 'none';
            }
        }
        
    </script>
</body>
</html>
